<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Magic and tiny tools animated banner</title>
  <desc id="desc">An animated banner with flowing lines connecting Magic, AI workflows, and tiny developer tools.</desc>
  <style>
    :root {
      --bg-a: #0f172a;
      --bg-b: #13251f;
      --mint: #7dd3fc;
      --green: #86efac;
      --gold: #fde68a;
      --ink: #e5f7ff;
      --muted: #9fb6c8;
    }

    .grid {
      animation: drift 16s linear infinite;
    }

    .orb {
      animation: pulse 3.8s ease-in-out infinite;
      transform-origin: center;
    }

    .orb.two {
      animation-delay: -1.1s;
    }

    .orb.three {
      animation-delay: -2.2s;
    }

    .flow {
      stroke-dasharray: 10 18;
      animation: flow 3.6s linear infinite;
    }

    .spark {
      animation: float 5s ease-in-out infinite;
    }

    .spark.alt {
      animation-delay: -2.4s;
    }

    .cursor {
      animation: blink 1.1s steps(2, end) infinite;
    }

    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(-48px); }
    }

    @keyframes flow {
      to { stroke-dashoffset: -56; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .72; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: .72; }
      50% { transform: translateY(-10px); opacity: 1; }
    }

    @keyframes blink {
      0%, 42% { opacity: 1; }
      43%, 100% { opacity: 0; }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--bg-a)"/>
      <stop offset=".54" stop-color="#10263a"/>
      <stop offset="1" stop-color="var(--bg-b)"/>
    </linearGradient>
    <linearGradient id="line" x1="172" y1="90" x2="802" y2="238" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--mint)"/>
      <stop offset=".52" stop-color="var(--green)"/>
      <stop offset="1" stop-color="var(--gold)"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(470 160) rotate(90) scale(168 404)">
      <stop stop-color="#5eead4" stop-opacity=".28"/>
      <stop offset=".62" stop-color="#38bdf8" stop-opacity=".08"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="960" height="320" rx="26" fill="url(#bg)"/>
  <rect width="960" height="320" rx="26" fill="url(#glow)"/>

  <g class="grid" opacity=".22" stroke="#d8f3ff" stroke-width="1">
    <path d="M-120 52H1080"/>
    <path d="M-120 100H1080"/>
    <path d="M-120 148H1080"/>
    <path d="M-120 196H1080"/>
    <path d="M-120 244H1080"/>
    <path d="M-72 -40V360"/>
    <path d="M-24 -40V360"/>
    <path d="M24 -40V360"/>
    <path d="M72 -40V360"/>
    <path d="M120 -40V360"/>
    <path d="M168 -40V360"/>
    <path d="M216 -40V360"/>
    <path d="M264 -40V360"/>
    <path d="M312 -40V360"/>
    <path d="M360 -40V360"/>
    <path d="M408 -40V360"/>
    <path d="M456 -40V360"/>
    <path d="M504 -40V360"/>
    <path d="M552 -40V360"/>
    <path d="M600 -40V360"/>
    <path d="M648 -40V360"/>
    <path d="M696 -40V360"/>
    <path d="M744 -40V360"/>
    <path d="M792 -40V360"/>
    <path d="M840 -40V360"/>
    <path d="M888 -40V360"/>
    <path d="M936 -40V360"/>
    <path d="M984 -40V360"/>
    <path d="M1032 -40V360"/>
  </g>

  <circle cx="732" cy="70" r="58" fill="#38bdf8" opacity=".16" filter="url(#blur)"/>
  <circle cx="260" cy="236" r="70" fill="#22c55e" opacity=".14" filter="url(#blur)"/>

  <path class="flow" d="M160 210C278 92 384 83 488 155C600 232 687 235 806 102" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
  <path class="flow" d="M160 246C306 168 400 196 501 222C612 251 702 218 806 168" stroke="url(#line)" stroke-width="2" stroke-linecap="round" opacity=".58"/>

  <g transform="translate(66 62)">
    <rect width="304" height="196" rx="22" fill="#0b1220" fill-opacity=".72" stroke="#7dd3fc" stroke-opacity=".28"/>
    <rect x="18" y="18" width="268" height="34" rx="12" fill="#172033"/>
    <circle cx="39" cy="35" r="5" fill="#fca5a5"/>
    <circle cx="58" cy="35" r="5" fill="#fde68a"/>
    <circle cx="77" cy="35" r="5" fill="#86efac"/>
    <text x="24" y="91" fill="var(--muted)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">workflow.run(</text>
    <text x="48" y="122" fill="var(--green)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">"edit-preview-save"</text>
    <text x="24" y="153" fill="var(--muted)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">)</text>
    <rect class="cursor" x="52" y="164" width="10" height="24" rx="3" fill="var(--mint)"/>
  </g>

  <g transform="translate(424 80)">
    <circle class="orb" cx="104" cy="82" r="76" fill="#0b1220" fill-opacity=".9" stroke="url(#line)" stroke-width="2"/>
    <circle class="orb two" cx="104" cy="82" r="50" fill="#13251f" fill-opacity=".7" stroke="#86efac" stroke-opacity=".45"/>
    <text x="104" y="76" text-anchor="middle" fill="var(--ink)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="800">Magic</text>
    <text x="104" y="106" text-anchor="middle" fill="var(--muted)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14">AI workflows</text>
  </g>

  <g transform="translate(678 62)">
    <rect width="220" height="56" rx="16" fill="#0b1220" fill-opacity=".76" stroke="#86efac" stroke-opacity=".34"/>
    <text x="26" y="36" fill="var(--ink)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700">tiny dev tools</text>

    <rect x="28" y="82" width="170" height="44" rx="14" fill="#122238" fill-opacity=".76" stroke="#7dd3fc" stroke-opacity=".28"/>
    <text x="52" y="110" fill="var(--mint)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">cmd dock</text>

    <rect x="0" y="144" width="204" height="44" rx="14" fill="#1b2433" fill-opacity=".78" stroke="#fde68a" stroke-opacity=".28"/>
    <text x="24" y="172" fill="var(--gold)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">vite plugin</text>
  </g>

  <g class="spark" fill="var(--gold)">
    <path d="M415 54l6 14 15 5-14 6-6 15-6-15-14-6 15-5 4-14z"/>
    <path d="M841 242l5 10 11 4-11 5-5 11-5-11-11-5 11-4 5-10z"/>
  </g>
  <g class="spark alt" fill="var(--mint)">
    <path d="M620 48l5 11 12 4-12 5-5 12-5-12-12-5 12-4 5-11z"/>
    <path d="M398 247l4 8 9 4-9 4-4 9-4-9-9-4 9-4 4-8z"/>
  </g>

  <circle class="orb three" cx="160" cy="210" r="7" fill="var(--mint)"/>
  <circle class="orb two" cx="806" cy="102" r="7" fill="var(--gold)"/>
  <circle class="orb" cx="806" cy="168" r="6" fill="var(--green)"/>
</svg>
